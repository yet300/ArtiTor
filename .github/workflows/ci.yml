name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android (4 ABIs) + AAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Install Rust + Android targets
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android
          cargo install cargo-ndk --locked
      - name: Set up Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
      - uses: gradle/actions/setup-gradle@v4
      - name: Assemble release AAR (bundles 4 ABIs)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: ./gradlew :tor:assembleRelease --no-configuration-cache

  apple:
    name: iOS (device + simulator)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Install Rust + Apple targets
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim
      - uses: gradle/actions/setup-gradle@v4
      - name: Compile Kotlin/Native (iosArm64 + iosSimulatorArm64)
        run: ./gradlew :tor:compileKotlinIosArm64 :tor:compileKotlinIosSimulatorArm64 --no-configuration-cache
