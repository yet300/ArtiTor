# Apple linking: C deps (zstd/lzma/ring) reference `__chkstk_darwin`, which is
# only exported by libSystem at deployment target >= 12. Without this, the iOS
# device cdylib link fails with "Undefined symbols: ___chkstk_darwin".
# Harmless for non-Apple targets (they ignore this env var).
[env]
IPHONEOS_DEPLOYMENT_TARGET = "13.0"
